; PHP-FPM admin/status pool configuration for the "www" pool
;
; This file creates a minimal, dedicated TCP listener used exclusively
; for Zabbix monitoring (status + ping queries). The main "www" pool
; continues to serve web traffic on its own socket/port.
;
; Naming convention: <poolname>-statusport.conf  (matches ADMIN_PATTERNS)
; Place this file alongside your regular pool configs, e.g.:
;   /etc/php/8.2/fpm/pool.d/www-statusport.conf
;

[www]

; Dedicated TCP port for status queries - choose a free port per pool
listen = 127.0.0.1:9001

; Restrict access to localhost only
listen.allowed_clients = 127.0.0.1

; Minimal process manager - one static worker is enough for status checks
pm = static
pm.max_children = 1

; Enable the status and ping endpoints (paths must match Zabbix macros)
pm.status_path = /php-fpm-status
ping.path = /php-fpm-ping
ping.response = pong

; Run as the same user/group as your main pool
; user = www-data
; group = www-data
