# PHP-FPM Multi Pool Monitoring - Zabbix Agent UserParameter Configuration
# Place this file in /etc/zabbix/zabbix_agentd.d/ (or your include directory)
# and ensure the scripts are installed to /etc/zabbix/scripts/ with execute permission.

# Discovery of PHP-FPM pools with active admin/status sockets
# $1 = status URL path  (default used by template: {$PHP_FPM_STATUS_URL})
# $2 = query timeout    (default used by template: {$PHP_FPM_TIMEOUT})
UserParameter=php-fpm.discover[*],/etc/zabbix/scripts/php_fpm_discover.sh "$1" "$2"

# Fetch JSON status for a specific pool
# $1 = socket (TCP address or Unix socket path)
# $2 = status URL path
# $3 = query timeout
UserParameter=php-fpm.status[*],/etc/zabbix/scripts/php_fpm_status.sh "$1" "$2" "$3"

# Ping a specific pool (returns 1 = up, 0 = down)
# $1 = socket (TCP address or Unix socket path)
# $2 = ping URL path
# $3 = query timeout
UserParameter=php-fpm.ping[*],/etc/zabbix/scripts/php_fpm_ping.sh "$1" "$2" "$3"
